version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smarterp-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword123
      POSTGRES_DB: smarterp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: smarterp-redis
    expose:
      - "6379"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smarterp-backend
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgresql1243@localhost:5432/smarterp?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=yoursupersecurejwtsecretkey987654321
    depends_on:
      - db
      - redis
    expose:
      - "5000"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smarterp-frontend
    environment:
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - backend
    expose:
      - "3000"
    restart: always

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: smarterp-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  postgres_data:
